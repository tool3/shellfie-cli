name: Update Dependency

on:
  repository_dispatch:
    types: [dependency-update]

permissions:
  contents: write

jobs:
  update-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update dependency and release
        run: |
          npm install ${{ github.event.client_payload.package }}@${{ github.event.client_payload.version }}
          git add package.json package-lock.json
          git commit -m "chore: update ${{ github.event.client_payload.package }} to v${{ github.event.client_payload.version }}"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit --amend -m "chore: update ${{ github.event.client_payload.package }} to v${{ github.event.client_payload.version }}"
          git tag "v$VERSION"
          git push
          git push --tags
